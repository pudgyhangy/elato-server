# fly.toml — Fly.io configuration for elato-server
# Deploy with: fly deploy (from the server repo root)

app = "elato-server"
primary_region = "sin"   # Singapore — change to closest region to your users
                         # Other options: lax (LA), syd (Sydney), nrt (Tokyo)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

# Keep at least 1 machine always running.
# This is critical for WebSocket — Fly.io won't cold-start a machine mid-connection.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  # WebSocket connections can be long-lived — extend the idle timeout
  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
